<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- boostrap CDN -->
    <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">

    <!-- fontawesom CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <!-- css file -->
     <link rel="stylesheet" href="./css/index.css">
    <title>Smart City | Home</title>
</head>

<body>
    <div class="container-fluid">

        <!-- Header Section -->
        <div class="row mb-1">
            <div class="col-12 p-0">
                <nav class="navbar  navbar-expand-lg bg-primary navrbar-dark">
                    <div class="container-fluid py-0">
                        <!-- brand name -->
                        <a class="navbar-brand fw-bold text-light py-0 mb-0" href="#">
                            <!-- Logo -->
                            <img src="./img/Smartcity logo1.png" class="img-fluid p-1"
                                style="width: 50px; height: 50px; padding: 0px;" alt="logo">Smart<span
                                style="color: green;">city</span></a>

                        <!-- toggle Button -->
                        <button class="navbar-toggler px-1" type="button" data-bs-toggle="collapse"
                            data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                            aria-expanded="false" aria-label="Toggle navigation">
                            <span class="navbar-toggler-icon"></span>
                        </button>
                        <div class="collapse navbar-collapse" id="navbarSupportedContent">

                            <!-- Menu's -->
                            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                                <li class="nav-item">
                                    <a class="nav-link active text-light" aria-current="page" href="#">Home</a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link text-light" href="#">About</a>
                                </li>

                                <li class="nav-item">
                                    <a class="nav-link text-light" href="#">Services</a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link text-light" href="#">Track Complaint</a>
                                </li>
                            </ul>

                            <!-- login register button -->
                            <form action="">
                                <button class="btn  btn-outline-light fs-6 py-0 px-2" type="submit">Login</button>
                                <button class="btn btn-outline-light fs-6 py-0 px-2" type="submit">Register</button>
                            </form>
                        </div>
                    </div>
                </nav>
            </div>
        </div>


        <!-- Slider Section  -->
        <section class="bg-info ">
            <div class="container-fluid p-0">
                <div class="row ">
                    <div class="col-12 p-0">
                        <div id="carouselExampleFade" class="carousel slide carousel-fade w-100">
                            <div class="carousel-inner">
                                <div class="carousel-item active w-100">
                                    <img src="./img/slider-1.png" class="img-fluid " alt="Monitoring center image">

                                </div>
                                <div class="carousel-item">
                                    <img src="..." class="d-block w-100" alt="...">
                                </div>
                                <div class="carousel-item">
                                    <img src="..." class="d-block w-100" alt="...">
                                </div>
                            </div>
                            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleFade"
                                data-bs-slide="prev">
                                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">Previous</span>
                            </button>
                            <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleFade"
                                data-bs-slide="next">
                                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">Next</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- cards -->
        <section class="bg-light text-center py-5">

            <div class="heading mb-4">
                <h1 style="color: #13326E;">What Issues Can You Report?</h1>
            </div>

            <div class="row g-4 justify-content-center">

                <div class="col-lg-3 col-md-6 col-12">
                    <div class="card shadow p-3 flex-row flex-md-column align-items-center">
                        <img src="./img/garbage_icon.png" width="60" class="me-3 mb-md-3" alt="">
                        <div class="card-body p-0">
                            <p class="fw-bold m-0">Garbage & Cleanliness</p>
                        </div>
                    </div>
                </div>

                <div class="col-lg-3 col-md-6 col-12">
                    <div class="card shadow p-3 flex-row flex-md-column align-items-center">
                        <img src="./img/water_leckage.png" width="60" class="me-3 mb-md-3" alt="">
                        <div class="card-body p-0">
                            <p class="fw-bold m-0">Water Leakage</p>
                        </div>
                    </div>
                </div>

                <div class="col-lg-3 col-md-6 col-12">
                    <div class="card shadow p-3 flex-row flex-md-column align-items-center">
                        <img src="./img/road_damage.png" width="60" class="me-3 mb-md-3" alt="">
                        <div class="card-body p-0">
                            <p class="fw-bold m-0">Road Damage</p>
                        </div>
                    </div>
                </div>

                <div class="col-lg-3 col-md-6 col-12">
                    <div class="card shadow p-3 flex-row flex-md-column align-items-center">
                        <img src="./img/street_lamp.png" width="60" class="me-3 mb-md-3" alt="">
                        <div class="card-body p-0">
                            <p class="fw-bold m-0">Street Light</p>
                        </div>
                    </div>
                </div>

            </div>

        </section>
    </div>

    <!-- Bootstrap JS -->
    <script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
